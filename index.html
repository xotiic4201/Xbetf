<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XBet Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(245, 158, 11, 0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        
        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }
        
        .nav-links a:hover {
            color: #f59e0b;
        }
        
        .xcoin-balance {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f59e0b20, #fbbf2420);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        
        .xcoin-icon {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #fbbf24, #f59e0b);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
        
        .btn {
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 2rem 2rem;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(251, 191, 36, 0.05));
            border-radius: 24px;
            margin-bottom: 3rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .hero p {
            color: #9ca3af;
            font-size: 1.2rem;
        }
        
        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .game-card {
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .game-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        
        .game-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1f2937, #111827);
            border-radius: 24px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #9ca3af;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        /* Slots Grid */
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .slot-reel {
            background: #000;
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid rgba(245, 158, 11, 0.3);
        }
        
        .slot-reel.spinning {
            animation: spin 0.1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }
        
        /* Dice */
        .dice-container {
            text-align: center;
            margin: 2rem 0;
        }
        
        .dice {
            width: 150px;
            height: 150px;
            background: #fff;
            border-radius: 24px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        
        .dice.rolling {
            animation: roll 0.5s ease-out;
        }
        
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Crash Game */
        .crash-graph {
            background: #000;
            border-radius: 12px;
            height: 300px;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
        }
        
        .crash-canvas {
            width: 100%;
            height: 100%;
        }
        
        .multiplier-display {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            color: #f59e0b;
            margin: 1rem 0;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #9ca3af;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        
        /* Chat */
        .chat-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 300px;
            background: #1f2937;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(245, 158, 11, 0.3);
            z-index: 1000;
        }
        
        .chat-header {
            background: #111827;
            padding: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 0.75rem;
        }
        
        .chat-message {
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        
        .chat-message strong {
            color: #f59e0b;
        }
        
        .chat-input {
            display: flex;
            padding: 0.75rem;
            border-top: 1px solid #374151;
        }
        
        .chat-input input {
            flex: 1;
            padding: 0.5rem;
            background: #111827;
            border: none;
            color: #fff;
            border-radius: 6px;
        }
        
        .chat-input button {
            margin-left: 0.5rem;
            padding: 0.5rem 1rem;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            background: #1f2937;
            border-left: 4px solid #f59e0b;
            z-index: 3000;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .nav-links span {
                display: none;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>XBet Casino</span>
            </div>
            <div class="nav-links">
                <div id="authButtons">
                    <a onclick="showAuthModal('login')">Login</a>
                    <a onclick="showAuthModal('register')" class="btn btn-primary">Sign Up</a>
                </div>
                <div id="userInfo" class="hidden">
                    <div class="xcoin-balance">
                        <div class="xcoin-icon"></div>
                        <span id="balance">0.00</span>
                        <span>XCoin</span>
                    </div>
                    <a onclick="logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="hero" id="hero">
            <h1>Welcome to XBet Casino</h1>
            <p>Play with XCoin • Provably Fair • Instant Withdrawals</p>
        </div>
        
        <div class="games-grid">
            <div class="game-card" onclick="openGame('slots')">
                <div class="game-icon">🎰</div>
                <h3 class="game-title">Slots</h3>
                <p>Spin to win big with XBet symbols</p>
            </div>
            <div class="game-card" onclick="openGame('dice')">
                <div class="game-icon">🎲</div>
                <h3 class="game-title">Dice</h3>
                <p>Roll under or over for massive multipliers</p>
            </div>
            <div class="game-card" onclick="openGame('crash')">
                <div class="game-icon">🚀</div>
                <h3 class="game-title">Crash</h3>
                <p>Cash out before it crashes</p>
            </div>
        </div>
    </div>
    
    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAuthModal()">&times;</span>
            <h2 id="authTitle">Login</h2>
            <form id="authForm" onsubmit="return false;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" onclick="handleAuth()">Submit</button>
            </form>
        </div>
    </div>
    
    <!-- Game Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeGameModal()">&times;</span>
            <div id="gameContent"></div>
        </div>
    </div>
    
    <!-- Chat -->
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header" onclick="toggleChat()">💬 Global Chat</div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button class="btn btn-primary" onclick="sendChatMessage()">Send</button>
        </div>
    </div>
    
    <script>
        // API Configuration
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'https://xbetb.onrender.com';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let ws = null;
        let currentGame = null;
        
        // Game state
        let slotsReels = ['🍒', '🍋', '🍊', '🍒', '🍋', '🍊', '🍒', '🍋', '🍊'];
        let diceRolling = false;
        let crashMultiplier = 1;
        let crashInterval = null;
        let crashCanvas = null;
        let crashCtx = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                verifyToken();
            }
            initWebSocket();
        });
        
        // Token verification
        async function verifyToken() {
            try {
                const response = await fetch(`${API_URL}/api/user/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    currentUser = { xcoin_balance: data.xcoin_balance };
                    updateUI(true);
                } else {
                    logout();
                }
            } catch (error) {
                logout();
            }
        }
        
        // WebSocket
        function initWebSocket() {
            if (!token) return;
            
            const wsUrl = API_URL.replace('http', 'ws') + `/ws/${token}`;
            ws = new WebSocket(wsUrl);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = () => {
                setTimeout(initWebSocket, 3000);
            };
        }
        
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'chat':
                    addChatMessage(data.user_email, data.message);
                    break;
                case 'crash_multiplier':
                    updateCrashMultiplier(data.multiplier);
                    break;
                case 'crash_crashed':
                    crashCrashed(data.multiplier);
                    break;
                case 'crash_bet_placed':
                    toast(`Player placed bet of ${data.bet} XCoin`);
                    break;
                case 'crash_cashout':
                    toast(`Player cashed out ${data.win.toFixed(2)} XCoin`);
                    break;
            }
        }
        
        // UI Updates
        function updateUI(loggedIn) {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const hero = document.getElementById('hero');
            const chatContainer = document.getElementById('chatContainer');
            
            if (loggedIn && currentUser) {
                authButtons.classList.add('hidden');
                userInfo.classList.remove('hidden');
                document.getElementById('balance').textContent = currentUser.xcoin_balance.toFixed(2);
                hero.innerHTML = `<h1>Welcome back!</h1><p>Your balance: ${currentUser.xcoin_balance.toFixed(2)} XCoin</p>`;
                chatContainer.style.display = 'flex';
            } else {
                authButtons.classList.remove('hidden');
                userInfo.classList.add('hidden');
                hero.innerHTML = `<h1>Welcome to XBet Casino</h1><p>Play with XCoin • Provably Fair • Instant Withdrawals</p>`;
                chatContainer.style.display = 'none';
            }
        }
        
        // Auth Functions
        function showAuthModal(type) {
            currentAuthType = type;
            document.getElementById('authTitle').textContent = type === 'login' ? 'Login to XBet' : 'Create XBet Account';
            document.getElementById('authModal').classList.add('active');
        }
        
        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }
        
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = currentAuthType === 'login' ? '/api/auth/login' : '/api/auth/register';
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = data.user;
                    updateUI(true);
                    closeAuthModal();
                    initWebSocket();
                    toast('Successfully logged in!');
                } else {
                    toast(data.error || 'Authentication failed');
                }
            } catch (error) {
                toast('Connection error');
            }
        }
        
        async function logout() {
            try {
                await fetch(`${API_URL}/api/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (error) {}
            
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            if (ws) ws.close();
            updateUI(false);
            toast('Logged out');
        }
        
        // Game Functions
        async function openGame(game) {
            if (!token) {
                toast('Please login first');
                showAuthModal('login');
                return;
            }
            
            currentGame = game;
            const gameContent = document.getElementById('gameContent');
            
            switch(game) {
                case 'slots':
                    gameContent.innerHTML = getSlotsHTML();
                    document.getElementById('gameModal').classList.add('active');
                    break;
                case 'dice':
                    gameContent.innerHTML = getDiceHTML();
                    document.getElementById('gameModal').classList.add('active');
                    break;
                case 'crash':
                    gameContent.innerHTML = getCrashHTML();
                    document.getElementById('gameModal').classist.add('active');
                    initCrashGame();
                    break;
            }
        }
        
        function getSlotsHTML() {
            return `
                <h2>XBet Slots</h2>
                <div class="slots-grid" id="slotsGrid">
                    ${slotsReels.map(s => `<div class="slot-reel">${s}</div>`).join('')}
                </div>
                <div class="form-group">
                    <label>Bet Amount (XCoin)</label>
                    <input type="number" id="betAmount" value="10" min="1" max="1000">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="spinSlots()">SPIN</button>
                <div id="slotResult" style="margin-top: 1rem; text-align: center;"></div>
            `;
        }
        
        async function spinSlots() {
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            
            if (betAmount > currentUser.xcoin_balance) {
                toast('Insufficient balance');
                return;
            }
            
            // Animate spinning
            const reels = document.querySelectorAll('.slot-reel');
            reels.forEach(reel => reel.classList.add('spinning'));
            
            try {
                const response = await fetch(`${API_URL}/api/games/slots/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ game: 'slots', xcoin_amount: betAmount, params: {} })
                });
                
                const data = await response.json();
                
                // Update UI
                reels.forEach((reel, i) => {
                    reel.classList.remove('spinning');
                    const symbol = data.result.reels[i];
                    const symbolMap = { cherry: '🍒', lemon: '🍋', orange: '🍊', plum: '🍑', bell: '🔔', xbet: '⭐' };
                    reel.textContent = symbolMap[symbol] || '🍒';
                });
                
                currentUser.xcoin_balance = data.new_balance;
                document.getElementById('balance').textContent = currentUser.xcoin_balance.toFixed(2);
                
                const resultDiv = document.getElementById('slotResult');
                if (data.outcome === 'win') {
                    resultDiv.innerHTML = `<div style="color: #10b981;">You won ${data.win_amount.toFixed(2)} XCoin!</div>`;
                    toast(`🎉 Won ${data.win_amount.toFixed(2)} XCoin!`);
                } else {
                    resultDiv.innerHTML = `<div style="color: #ef4444;">You lost ${betAmount} XCoin</div>`;
                }
            } catch (error) {
                reels.forEach(reel => reel.classList.remove('spinning'));
                toast('Game error');
            }
        }
        
        function getDiceHTML() {
            return `
                <h2>XBet Dice</h2>
                <div class="dice-container">
                    <div class="dice" id="dice">🎲</div>
                    <div class="form-group">
                        <label>Bet Amount (XCoin)</label>
                        <input type="number" id="diceBet" value="10" min="1">
                    </div>
                    <div class="form-group">
                        <label>Target (1-99)</label>
                        <input type="number" id="target" value="50" min="1" max="99">
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <select id="condition">
                            <option value="under">Under</option>
                            <option value="over">Over</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="rollDice()">ROLL DICE</button>
                    <div id="diceResult" style="margin-top: 1rem; text-align: center;"></div>
                </div>
            `;
        }
        
        async function rollDice() {
            const betAmount = parseFloat(document.getElementById('diceBet').value);
            const target = parseInt(document.getElementById('target').value);
            const condition = document.getElementById('condition').value;
            
            if (betAmount > currentUser.xcoin_balance) {
                toast('Insufficient balance');
                return;
            }
            
            const dice = document.getElementById('dice');
            dice.classList.add('rolling');
            
            try {
                const response = await fetch(`${API_URL}/api/games/dice/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        game: 'dice', 
                        xcoin_amount: betAmount, 
                        params: { target, condition } 
                    })
                });
                
                const data = await response.json();
                
                setTimeout(() => {
                    dice.classList.remove('rolling');
                    const roll = data.result.roll;
                    const rollEmoji = getRollEmoji(roll);
                    dice.textContent = rollEmoji;
                    
                    currentUser.xcoin_balance = data.new_balance;
                    document.getElementById('balance').textContent = currentUser.xcoin_balance.toFixed(2);
                    
                    const resultDiv = document.getElementById('diceResult');
                    if (data.outcome === 'win') {
                        resultDiv.innerHTML = `<div style="color: #10b981;">Rolled ${roll.toFixed(2)} - Won ${data.win_amount.toFixed(2)} XCoin!</div>`;
                        toast(`🎲 Won ${data.win_amount.toFixed(2)} XCoin!`);
                    } else {
                        resultDiv.innerHTML = `<div style="color: #ef4444;">Rolled ${roll.toFixed(2)} - Lost ${betAmount} XCoin</div>`;
                    }
                }, 500);
            } catch (error) {
                dice.classList.remove('rolling');
                toast('Game error');
            }
        }
        
        function getRollEmoji(roll) {
            if (roll < 20) return '💀';
            if (roll < 40) return '😐';
            if (roll < 60) return '🙂';
            if (roll < 80) return '😊';
            return '🚀';
        }
        
        function getCrashHTML() {
            return `
                <h2>XBet Crash</h2>
                <div class="multiplier-display" id="multiplierDisplay">1.00x</div>
                <div class="crash-graph">
                    <canvas id="crashCanvas" width="700" height="250" style="width:100%; height:100%;"></canvas>
                </div>
                <div class="form-group">
                    <label>Bet Amount (XCoin)</label>
                    <input type="number" id="crashBet" value="10" min="1">
                </div>
                <div class="form-group">
                    <label>Auto Cashout (multiplier)</label>
                    <input type="number" id="autoCashout" step="0.1" placeholder="Optional">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="placeCrashBet()" id="placeBetBtn">Place Bet</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="cashoutCrash()" id="cashoutBtn" disabled>Cash Out</button>
                </div>
                <div id="crashResult" style="margin-top: 1rem; text-align: center;"></div>
            `;
        }
        
        function initCrashGame() {
            crashCanvas = document.getElementById('crashCanvas');
            crashCtx = crashCanvas.getContext('2d');
            drawCrashGraph(1);
            
            // Start game if not active
            fetch(`${API_URL}/api/games/crash/start`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            }).catch(() => {});
        }
        
        function updateCrashMultiplier(multiplier) {
            crashMultiplier = multiplier;
            document.getElementById('multiplierDisplay').textContent = `${multiplier.toFixed(2)}x`;
            drawCrashGraph(multiplier);
        }
        
        function drawCrashGraph(currentMultiplier) {
            if (!crashCtx) return;
            const canvas = crashCanvas;
            const ctx = crashCtx;
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            for (let x = 0; x <= w; x++) {
                const t = x / w;
                const m = Math.pow(1.03, t * 20);
                const y = h - (m / 20) * h;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Draw current point
            const currentX = w * (Math.log(currentMultiplier) / Math.log(1.03)) / 20;
            const currentY = h - (currentMultiplier / 20) * h;
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(currentX, currentY, 5, 0, 2 * Math.PI);
            ctx.fill();
        }
        
        function crashCrashed(multiplier) {
            document.getElementById('placeBetBtn').disabled = false;
            document.getElementById('cashoutBtn').disabled = true;
            toast(`Game crashed at ${multiplier.toFixed(2)}x`);
            
            // Restart after 3 seconds
            setTimeout(() => {
                fetch(`${API_URL}/api/games/crash/start`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).catch(() => {});
            }, 3000);
        }
        
        function placeCrashBet() {
            const betAmount = parseFloat(document.getElementById('crashBet').value);
            const autoCashout = parseFloat(document.getElementById('autoCashout').value);
            
            if (betAmount > currentUser.xcoin_balance) {
                toast('Insufficient balance');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'crash_bet',
                    amount: betAmount,
                    auto_cashout: autoCashout || null
                }));
                
                currentUser.xcoin_balance -= betAmount;
                document.getElementById('balance').textContent = currentUser.xcoin_balance.toFixed(2);
                document.getElementById('placeBetBtn').disabled = true;
                document.getElementById('cashoutBtn').disabled = false;
                toast(`Bet placed: ${betAmount} XCoin`);
            }
        }
        
        function cashoutCrash() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'crash_cashout' }));
                document.getElementById('cashoutBtn').disabled = true;
            }
        }
        
        // Chat Functions
        let chatOpen = true;
        
        function toggleChat() {
            chatOpen = !chatOpen;
            const messages = document.querySelector('.chat-messages');
            const input = document.querySelector('.chat-input');
            if (chatOpen) {
                messages.style.display = 'block';
                input.style.display = 'flex';
            } else {
                messages.style.display = 'none';
                input.style.display = 'none';
            }
        }
        
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !ws) return;
            
            ws.send(JSON.stringify({
                type: 'chat',
                message: message,
                room: 'global'
            }));
            input.value = '';
        }
        
        function addChatMessage(user, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `<strong>${user}:</strong> ${escapeHtml(message)}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            // Limit messages
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Toast Notifications
        function toast(message) {
            const toastDiv = document.createElement('div');
            toastDiv.className = 'toast';
            toastDiv.textContent = message;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 3000);
        }
        
        function closeGameModal() {
            document.getElementById('gameModal').classList.remove('active');
            if (crashInterval) clearInterval(crashInterval);
            currentGame = null;
        }
    </script>
</body>
</html>
